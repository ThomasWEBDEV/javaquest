spring:
  application:
    name: javaquest

  datasource:
    url: jdbc:postgresql://localhost:5432/javaquest
    username: javaquest
    password: javaquest
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: javaquest-local-dev-secret-key-minimum-256-bits-for-security
  expiration: 86400000

logging:
  level:
    com.javaquest: DEBUG
    org.springframework.security: INFO
